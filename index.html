<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0f0f13;--surface:#1a1a22;--surface2:#22222e;--border:#2e2e3e;
  --accent:#7c6ef7;--green:#5ee6c0;--yellow:#f7c76e;--red:#f76e6e;--blue:#6eaff7;
  --text:#e8e8f0;--muted:#7a7a94;--radius:14px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(70px + var(--safe-bottom));}
#nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);
  display:flex;padding-bottom:var(--safe-bottom);z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 2px;gap:3px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:9px;transition:color 0.15s;}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:20px;line-height:1;}
/* LOCK SCREEN */
#lock-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:0;padding:40px 24px;background:var(--bg);}
.lock-logo{font-size:56px;margin-bottom:16px;}
.lock-title{font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px;}
.lock-sub{font-size:14px;color:var(--muted);margin-bottom:36px;text-align:center;}
.pin-dots{display:flex;gap:16px;margin-bottom:32px;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);transition:all 0.15s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 10px rgba(124,110,247,0.5);}
.pin-dot.error{background:var(--red);border-color:var(--red);animation:shake 0.4s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px;}
.pin-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);
  height:68px;border-radius:50%;font-size:24px;font-weight:600;cursor:pointer;transition:all 0.1s;
  display:flex;align-items:center;justify-content:center;}
.pin-btn:active{background:var(--accent);border-color:var(--accent);transform:scale(0.93);}
.pin-btn.del{font-size:20px;color:var(--muted);}
.faceid-btn{display:flex;align-items:center;gap:8px;background:none;border:1px solid var(--border);
  color:var(--text);padding:12px 24px;border-radius:50px;font-size:14px;font-weight:600;cursor:pointer;margin-top:16px;transition:all 0.15s;}
.faceid-btn:hover{border-color:var(--accent);color:var(--accent);}
.lock-setup{display:flex;flex-direction:column;align-items:center;width:100%;max-width:280px;gap:12px;}
/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:32px;padding:40px 24px;}
.login-logo{font-size:72px;}
.login-title{font-size:28px;font-weight:800;text-align:center;letter-spacing:-1px;}
.login-sub{font-size:15px;color:var(--muted);text-align:center;line-height:1.6;margin-top:8px;}
.google-btn{display:flex;align-items:center;gap:12px;background:#fff;color:#111;padding:14px 28px;
  border-radius:50px;font-size:16px;font-weight:600;cursor:pointer;border:none;
  box-shadow:0 4px 24px rgba(0,0,0,0.35);transition:opacity 0.15s;}
.google-btn:hover{opacity:0.9;}
.google-btn img{width:22px;height:22px;}
/* LOADER */
.loader{display:flex;align-items:center;justify-content:center;height:100%;font-size:32px;}
/* MISC */
.page-header{padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between;}
.page-title{font-size:22px;font-weight:700;letter-spacing:-0.5px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;
  border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity 0.15s;}
.btn:hover{opacity:0.88;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-full{width:100%;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;
  font-size:12px;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.chip.green{background:rgba(94,230,192,0.12);border-color:rgba(94,230,192,0.3);color:var(--green);}
.chip.red{background:rgba(247,110,110,0.12);border-color:rgba(247,110,110,0.3);color:var(--red);}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:0.3px;}
input,select{background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:11px 14px;border-radius:10px;font-size:15px;font-family:inherit;outline:none;width:100%;transition:border 0.15s;}
input:focus,select:focus{border-color:var(--accent);}
select option{background:var(--surface2);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-end;}
#modal-overlay.open{display:flex;}
#modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;
  padding:24px 20px calc(24px + var(--safe-bottom));animation:slideUp 0.25s ease;position:relative;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px;}
.modal-close{position:absolute;top:20px;right:20px;background:var(--surface2);border:none;color:var(--muted);
  width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.list-row{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);}
.list-row:last-child{border-bottom:none;}
.list-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.list-info{flex:1;min-width:0;}
.list-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.list-right{text-align:right;flex-shrink:0;}
.list-amount{font-size:15px;font-weight:600;}
.tabs{display:flex;background:var(--surface2);border-radius:12px;padding:4px;margin:0 20px 16px;}
.tab{flex:1;padding:8px;border-radius:9px;font-size:13px;font-weight:600;text-align:center;
  cursor:pointer;color:var(--muted);border:none;background:none;transition:all 0.15s;}
.tab.active{background:var(--accent);color:#fff;}
.progress-wrap{background:var(--surface2);border-radius:6px;height:8px;overflow:hidden;}
.progress-bar{height:100%;border-radius:6px;transition:width 0.4s;}
.section-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;padding:16px 20px 8px;font-weight:600;}
.back-btn{background:none;border:none;color:var(--accent);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;}
.empty{padding:48px 20px;text-align:center;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.fab{position:fixed;bottom:calc(80px + var(--safe-bottom));right:20px;width:52px;height:52px;
  background:var(--accent);border:none;border-radius:50%;color:#fff;font-size:26px;
  cursor:pointer;box-shadow:0 4px 20px rgba(124,110,247,0.4);display:flex;align-items:center;justify-content:center;z-index:50;}
.toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:12px 0;}
.toggle{width:44px;height:26px;background:var(--border);border-radius:13px;position:relative;cursor:pointer;border:none;transition:background 0.2s;}
.toggle.on{background:var(--accent);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left 0.2s;}
.toggle.on::after{left:21px;}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.cat-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;
  border-radius:12px;border:2px solid var(--border);cursor:pointer;transition:all 0.15s;background:var(--surface2);}
.cat-item.selected{border-color:var(--accent);background:rgba(124,110,247,0.12);}
.cat-item .ci{font-size:22px;}.cat-item .cn{font-size:10px;color:var(--muted);text-align:center;}
.cat-item.selected .cn{color:var(--accent);}
.hero{padding:24px 20px 20px;background:linear-gradient(135deg,rgba(124,110,247,0.15) 0%,rgba(15,15,19,0) 60%);}
.hero-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.hero-value{font-size:36px;font-weight:800;letter-spacing:-1px;}
.hero-sub{font-size:13px;color:var(--muted);margin-top:4px;}
.user-bar{display:flex;align-items:center;gap:10px;}
.user-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;}
.signout-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;}
/* DONUT CHART */
.chart-wrap{display:flex;flex-direction:column;align-items:center;padding:24px 20px 12px;}
.donut-container{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.donut-center{position:absolute;text-align:center;pointer-events:none;}
.donut-center-val{font-size:22px;font-weight:800;color:var(--text);}
.donut-center-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.legend{display:flex;flex-direction:column;gap:10px;width:100%;padding:0 20px 20px;}
.legend-row{display:flex;align-items:center;gap:10px;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.legend-name{flex:1;font-size:13px;}
.legend-pct{font-size:12px;color:var(--muted);margin-right:4px;}
.legend-val{font-size:13px;font-weight:600;}
.legend-bar-wrap{width:100%;background:var(--surface2);border-radius:4px;height:4px;margin-top:3px;}
.legend-bar{height:4px;border-radius:4px;}
/* MONTH SELECTOR */
.month-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 20px 16px;}
.mnav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;}
.mnav-label{font-size:15px;font-weight:600;min-width:130px;text-align:center;}
/* DASH CHART */
.dash-chart-wrap{padding:20px 20px 8px;position:relative;}
.dash-chart-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:20px;display:flex;flex-direction:column;align-items:center;gap:16px;
  position:relative;overflow:hidden;}
.dash-chart-card::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(124,110,247,0.08) 0%,transparent 70%);pointer-events:none;}
.dash-chart-inner{position:relative;display:flex;align-items:center;justify-content:center;}
.dash-chart-center{position:absolute;text-align:center;pointer-events:none;}
.dash-chart-center-val{font-size:18px;font-weight:800;color:var(--text);}
.dash-chart-center-lbl{font-size:10px;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;}
.dash-chart-legend{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;}
.dcl-item{display:flex;align-items:center;gap:6px;}
.dcl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dcl-name{font-size:11px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dcl-val{font-size:11px;font-weight:600;color:var(--text);}
/* NOTIF BANNER */
.notif-banner{margin:0 20px 16px;padding:14px 16px;background:rgba(124,110,247,0.12);border:1px solid rgba(124,110,247,0.3);border-radius:12px;display:flex;align-items:center;gap:12px;}
.notif-banner-text{flex:1;font-size:13px;line-height:1.4;}
</style>

<body>
<div id="app"><div class="loader">⏳</div></div>
<div id="modal-overlay" onclick="W.closeModalOutside(event)"><div id="modal"></div></div>

<script type="module">
import { initializeApp }                             from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
                                                     from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { getFirestore, initializeFirestore, persistentLocalCache,
         doc, collection, addDoc, getDocs, updateDoc, deleteDoc, setDoc, getDoc }
                                                     from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyB4Eb4AakqKu7qSZN9BP0_fS3DbgFn_PJA",
  authDomain:"finance-094683.firebaseapp.com",
  projectId:"finance-094683",
  storageBucket:"finance-094683.firebasestorage.app",
  messagingSenderId:"450535794066",
  appId:"1:450535794066:web:d87498b32d4b72d6d10d4b"
};
const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = initializeFirestore(fbApp, { localCache: persistentLocalCache() });

// ── Constants ──────────────────────────────────────
const CATS = [
  {id:'food',label:'Food',icon:'🍽️'},{id:'rent',label:'Rent',icon:'🏠'},
  {id:'fuel',label:'Fuel',icon:'⛽'},{id:'clothes',label:'Clothes',icon:'👕'},
  {id:'transport',label:'Transport',icon:'🚗'},{id:'utilities',label:'Utilities',icon:'💡'},
  {id:'business',label:'Business',icon:'💼'},{id:'health',label:'Health',icon:'💊'},
  {id:'other',label:'Other',icon:'📌'},
];
const DEF_ACCOUNTS = [
  {id:'cbe',name:'CBE',color:'#5ee6c0',icon:'🟢',balance:0},
  {id:'awash',name:'Awash',color:'#f7c76e',icon:'🟡',balance:0},
  {id:'abys',name:'Abyssinia',color:'#7c6ef7',icon:'🟣',balance:0},
  {id:'orm',name:'Oromia',color:'#f76e6e',icon:'🔴',balance:0},
  {id:'zemen',name:'Zemen',color:'#6eaff7',icon:'🔵',balance:0},
  {id:'nib',name:'NIB International',color:'#f7a76e',icon:'🟠',balance:0},
  {id:'telebirr',name:'Telebirr',color:'#e65ead',icon:'🩷',balance:0},
];

// ── State ──────────────────────────────────────────
let CU = null; // current user
let DB = {accounts:[],transactions:[],savings:{balance:0,goal:10000,history:[]},debts:[]};
let page = 'dashboard', detailId = null, detailTab = 'expense';

// ── Helpers ────────────────────────────────────────
const fmtETB = n=>'ETB '+Number(n||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtUSD = n=>'$'+Number(n||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmt    = (n,c)=>c==='USD'?fmtUSD(n):fmtETB(n);
const genId  = ()=>Date.now()+Math.random().toString(36).slice(2);
const cat    = id=>CATS.find(c=>c.id===id)||{label:'',icon:'📌'};
const acct   = id=>DB.accounts.find(a=>a.id===id)||{name:'',color:'#7c6ef7',icon:'🏦'};

// ── Firestore refs ─────────────────────────────────
const acRef    = id=>doc(db,'users',CU.uid,'accounts',id);
const txCol    = ()=>collection(db,'users',CU.uid,'transactions');
const txRef    = id=>doc(db,'users',CU.uid,'transactions',id);
const savRef   = ()=>doc(db,'users',CU.uid,'savings','main');
const debtCol  = ()=>collection(db,'users',CU.uid,'debts');
const debtRef  = id=>doc(db,'users',CU.uid,'debts',id);
const logoRef  = id=>doc(db,'shared_logos',id);
const isAdmin  = ()=>CU?.email==='nolawidaniel23@gmail.com';

// ── Load data ──────────────────────────────────────
async function loadData(){
  const acSnap = await getDocs(collection(db,'users',CU.uid,'accounts'));
  if(acSnap.empty){
    for(const a of DEF_ACCOUNTS) await setDoc(acRef(a.id),a);
    DB.accounts = DEF_ACCOUNTS.map(a=>({...a}));
  } else {
    DB.accounts = acSnap.docs.map(d=>d.data());
    for(const def of DEF_ACCOUNTS){
      if(!DB.accounts.find(a=>a.id===def.id)){
        await setDoc(acRef(def.id),def);
        DB.accounts.push({...def});
      }
    }
  }
  const txSnap = await getDocs(txCol());
  DB.transactions = txSnap.docs.map(d=>({...d.data(),id:d.id}));
  const savSnap = await getDoc(savRef());
  if(savSnap.exists()) DB.savings = savSnap.data();
  else{ DB.savings={balance:0,goal:10000,history:[]}; await setDoc(savRef(),DB.savings); }
  const debtSnap = await getDocs(debtCol());
  DB.debts = debtSnap.docs.map(d=>({...d.data(),id:d.id}));

  // load shared logos into accounts
  for(const a of DB.accounts){
    const lSnap = await getDoc(logoRef(a.id));
    if(lSnap.exists()) a.logoUrl = lSnap.data().url;
  }
}

// ── Computed ───────────────────────────────────────
function balOf(id){
  let b=acct(id).balance||0;
  DB.transactions.filter(t=>t.accountId===id).forEach(t=>{
    if(t.type==='income') b+=t.amount;
    if(t.type==='expense') b-=t.amount;
  });
  return b;
}
const totalCash=()=>DB.accounts.reduce((s,a)=>s+balOf(a.id),0);
const loansGiven=()=>DB.debts.filter(d=>d.type==='lent'&&!d.paid).reduce((s,d)=>s+d.amount,0);
const loansOwed=()=>DB.debts.filter(d=>d.type==='borrowed'&&!d.paid).reduce((s,d)=>s+d.amount,0);
const payables=()=>DB.debts.filter(d=>d.type==='payable'&&!d.paid).reduce((s,d)=>s+d.amount,0);
const netWorth=()=>totalCash()+DB.savings.balance-loansOwed()-payables();
function mTx(type){ const n=new Date(),y=n.getFullYear(),m=n.getMonth();
  return DB.transactions.filter(t=>{ const d=new Date(t.date+'T00:00:00'); return d.getFullYear()===y&&d.getMonth()===m&&(!type||t.type===type); }); }

// ── Lock / PIN ─────────────────────────────────────
const PIN_KEY  = 'hisab_pin_hash';
const CRED_KEY = 'hisab_cred_id';
let pinBuffer  = '';
let pinMode    = 'unlock'; // 'unlock' | 'setup1' | 'setup2'
let pinFirst   = '';
let appUnlocked = false;

function hashPin(pin){ let h=0; for(const c of pin) h=(h<<5)-h+c.charCodeAt(0); return h.toString(36); }
function getStoredPin(){ return localStorage.getItem(PIN_KEY); }
function savePin(pin){ localStorage.setItem(PIN_KEY, hashPin(pin)); }
function hasBiometric(){ return !!localStorage.getItem(CRED_KEY); }

async function registerBiometric(){
  if(!window.PublicKeyCredential) return false;
  try{
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const cred = await navigator.credentials.create({publicKey:{
      challenge, rp:{name:'Hisab'}, user:{id:new Uint8Array(16),name:CU?.email||'user',displayName:'Hisab User'},
      pubKeyCredParams:[{type:'public-key',alg:-7}],
      authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},
      timeout:60000
    }});
    localStorage.setItem(CRED_KEY, btoa(String.fromCharCode(...new Uint8Array(cred.rawId))));
    return true;
  }catch(e){ return false; }
}

async function verifyBiometric(){
  if(!window.PublicKeyCredential||!hasBiometric()) return false;
  try{
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const rawId = Uint8Array.from(atob(localStorage.getItem(CRED_KEY)),c=>c.charCodeAt(0));
    await navigator.credentials.get({publicKey:{
      challenge, allowCredentials:[{type:'public-key',id:rawId}],
      userVerification:'required', timeout:60000
    }});
    return true;
  }catch(e){ return false; }
}

function showLockScreen(){
  const hasPin = !!getStoredPin();
  pinBuffer='';
  pinMode = hasPin ? 'unlock' : 'setup1';
  const subtitle = !hasPin ? 'Create a 4-digit PIN to secure Hisab' :
    hasBiometric() ? 'Use Face ID or enter your PIN' : 'Enter your PIN to continue';
  const faceBtn = hasPin ? `<button class="faceid-btn" onclick="W.tryFaceId()">🔒 Use Face ID</button>` : '';

  document.getElementById('app').innerHTML=`
  <div id="lock-screen">
    <div class="lock-logo">💰</div>
    <div class="lock-title">Hisab</div>
    <div class="lock-sub">${!hasPin?'Set up a PIN to secure your app':subtitle}</div>
    <div class="pin-dots" id="pin-dots">
      ${[0,1,2,3].map(i=>`<div class="pin-dot" id="pd-${i}"></div>`).join('')}
    </div>
    <div class="pin-grid">
      ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>`
        <button class="pin-btn${k==='⌫'?' del':''}" ${k===''?'style="visibility:hidden;"':''} onclick="W.pinKey('${k}')">${k}</button>`).join('')}
    </div>
    ${faceBtn}
    ${hasPin?`<button style="background:none;border:none;color:var(--muted);font-size:13px;margin-top:20px;cursor:pointer;" onclick="W.resetPin()">Forgot PIN? Sign out & reset</button>`:''}
  </div>`;

  // auto-trigger Face ID if already registered
  if(hasPin && hasBiometric()) setTimeout(()=>W.tryFaceId(), 400);
}

function pinKey(k){
  if(k==='⌫'){ pinBuffer=pinBuffer.slice(0,-1); updateDots(); return; }
  if(pinBuffer.length>=4) return;
  pinBuffer+=String(k);
  updateDots();
  if(pinBuffer.length===4) setTimeout(processPin,120);
}

function updateDots(error=false){
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd-'+i);
    if(!d) return;
    d.className='pin-dot'+(i<pinBuffer.length?' filled':'')+(error?' error':'');
  }
}

function processPin(){
  if(pinMode==='unlock'){
    if(hashPin(pinBuffer)===getStoredPin()){ unlockApp(); }
    else{ updateDots(true); setTimeout(()=>{ pinBuffer=''; updateDots(); },600); }
  } else if(pinMode==='setup1'){
    pinFirst=pinBuffer; pinBuffer=''; pinMode='setup2';
    document.querySelector('.lock-sub').textContent='Confirm your PIN';
    updateDots();
  } else if(pinMode==='setup2'){
    if(pinBuffer===pinFirst){
      savePin(pinBuffer);
      // offer biometric
      offerBiometric();
    } else {
      updateDots(true);
      setTimeout(()=>{ pinBuffer=''; pinFirst=''; pinMode='setup1';
        document.querySelector('.lock-sub').textContent='PINs didn\'t match. Try again.';
        updateDots(); },700);
    }
  }
}

async function offerBiometric(){
  if(!window.PublicKeyCredential){ unlockApp(); return; }
  const supported = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().catch(()=>false);
  if(!supported){ unlockApp(); return; }
  // show offer
  document.getElementById('app').innerHTML=`
  <div id="lock-screen">
    <div class="lock-logo">🔒</div>
    <div class="lock-title">Enable Face ID?</div>
    <div class="lock-sub">Use Face ID to unlock Hisab instantly</div>
    <div class="lock-setup">
      <button class="btn btn-primary btn-full" onclick="W.enableFaceId()">Enable Face ID</button>
      <button class="btn btn-ghost btn-full" onclick="W.unlockApp()">Skip, use PIN only</button>
    </div>
  </div>`;
}

async function enableFaceId(){
  const ok = await registerBiometric();
  if(ok && Notification.permission==='granted'){ new Notification('Hisab 💰',{body:'Face ID enabled!'}); }
  unlockApp();
}

async function tryFaceId(){
  const ok = await verifyBiometric();
  if(ok) unlockApp();
  // if failed, just let user use PIN
}

function resetPin(){

  localStorage.removeItem(PIN_KEY);

}

function drawDashChart(){
  const section = document.getElementById('dash-chart-section');
  if(!section) return;

  const expenses = mTx('expense');
  const catMap = {};
  expenses.forEach(t=>{ const k=t.category||'other'; catMap[k]=(catMap[k]||0)+t.amount; });
  const total = Object.values(catMap).reduce((s,v)=>s+v,0);

  if(total===0){
    section.innerHTML='';
    return;
  }

  const COLORS=['#7c6ef7','#5ee6c0','#f7c76e','#f76e6e','#6eaff7','#f76eae','#ae6ef7','#5ec0e6','#94e65e'];
  const segments = Object.entries(catMap).sort((a,b)=>b[1]-a[1])
    .map(([id,val],i)=>({id,val,color:COLORS[i%COLORS.length],cat:cat(id)}));

  const top5 = segments.slice(0,6);
  const legendHTML = top5.map(s=>`
    <div class="dcl-item">
      <div class="dcl-dot" style="background:${s.color};box-shadow:0 0 6px ${s.color};"></div>
      <div class="dcl-name">${s.cat.icon} ${s.cat.label||s.id}</div>
      <div class="dcl-val">${(s.val/total*100).toFixed(0)}%</div>
    </div>`).join('');

  section.innerHTML=`
    <div class="dash-chart-card">
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;align-self:flex-start;">Spending This Month</div>
      <div class="dash-chart-inner">
        <canvas id="dash-donut" width="200" height="200"></canvas>
        <div class="dash-chart-center">
          <div class="dash-chart-center-val">${fmtETB(total).replace('ETB ','')}</div>
          <div class="dash-chart-center-lbl">ETB spent</div>
        </div>
      </div>
      <div class="dash-chart-legend">${legendHTML}</div>
    </div>`;

  // Animated draw
  const canvas = document.getElementById('dash-donut');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx=100,cy=100,outerR=88,innerR=60;
  let progress = 0;
  const totalVal = segments.reduce((s,x)=>s+x.val,0);

  function easeOut(t){ return 1 - Math.pow(1-t,3); }

  function frame(){
    progress = Math.min(progress+0.03, 1);
    const drawn = easeOut(progress);
    ctx.clearRect(0,0,200,200);

    let angle = -Math.PI/2;
    segments.forEach((seg,i)=>{
      const sweep = (seg.val/totalVal)*2*Math.PI*drawn;
      if(sweep < 0.001) return;

      // glow
      ctx.save();
      ctx.shadowColor = seg.color;
      ctx.shadowBlur = 12;

      ctx.beginPath();
      ctx.moveTo(cx+outerR*Math.cos(angle), cy+outerR*Math.sin(angle));
      ctx.arc(cx,cy,outerR,angle,angle+sweep);
      ctx.arc(cx,cy,innerR,angle+sweep,angle,true);
      ctx.closePath();
      ctx.fillStyle = seg.color;
      ctx.fill();
      ctx.restore();

      angle += sweep + (drawn>0.98 ? 0.025 : 0);
    });

    // dark center
    ctx.save();
    ctx.shadowColor='transparent';
    ctx.beginPath();
    ctx.arc(cx,cy,innerR-3,0,2*Math.PI);
    ctx.fillStyle='#1a1a22';
    ctx.fill();
    ctx.restore();

    if(progress < 1) requestAnimationFrame(frame);
    else pulseGlow(ctx,cx,cy,innerR,segments[0]?.color||'#7c6ef7');
  }

  // subtle pulse after draw
  let pulseDir=1, pulseVal=0;
  function pulseGlow(ctx,cx,cy,r,color){
    pulseVal+=0.04*pulseDir;
    if(pulseVal>=1||pulseVal<=0) pulseDir*=-1;
    ctx.save();
    ctx.shadowColor=color;
    ctx.shadowBlur=8+pulseVal*10;
    ctx.beginPath();
    ctx.arc(cx,cy,r-3,0,2*Math.PI);
    ctx.fillStyle='#1a1a22';
    ctx.fill();
    ctx.restore();
    requestAnimationFrame(()=>pulseGlow(ctx,cx,cy,r,color));
  }

  requestAnimationFrame(frame);
}

  const note   = document.getElementById('edit-note')?.value.trim()||'';
  if(!name||isNaN(amount)||amount<=0||!date){ alert('Fill in all fields.'); return; }

        <div class="cat-grid">${CATS.map(c=>`<div class="cat-item" id="ci-${c.id}" onclick="W.selCat('${c.id}')"><div class="ci">${c.icon}</div><div class="cn">${c.label}</div></div>`).join('')}</div></div>`:''}

function selCat(id){ window._cat=id;
  document.querySelectorAll('.cat-item').forEach(e=>e.classList.remove('selected'));
  document.getElementById('ci-'+id)?.classList.add('selected'); }

function togRec(){ window._rec=!window._rec; document.getElementById('rec-tog')?.classList.toggle('on',window._rec); }

async function submitTx(accountId,type){
  const name=document.getElementById('inp-name')?.value.trim()||'';
  const amount=parseFloat(document.getElementById('inp-amount')?.value||0);
  const cur=document.getElementById('inp-cur')?.value||'ETB';
  const date=document.getElementById('inp-date')?.value||'';
  const note=document.getElementById('inp-note')?.value.trim()||'';
  if(!name||isNaN(amount)||amount<=0||!date){ alert('Fill in name, amount, and date.'); return; }
  if(type==='expense'&&!window._cat){ alert('Pick a category.'); return; }
  const tx={accountId,type,amount,currency:cur,category:window._cat||null,name,note,date,recurring:window._rec||false,paid:false};
  const ref=await addDoc(txCol(),tx);
  DB.transactions.push({...tx,id:ref.id});
  closeModal(); render();
}

async function submitSav(type){
  const amount=parseFloat(document.getElementById('sav-amt')?.value||0);
  const date=document.getElementById('sav-date')?.value||'';
  const note=document.getElementById('sav-note')?.value.trim()||'';
  if(isNaN(amount)||amount<=0||!date){ alert('Enter a valid amount and date.'); return; }
  if(type==='withdraw'&&amount>DB.savings.balance){ alert('Not enough balance.'); return; }
  DB.savings.balance=type==='deposit'?DB.savings.balance+amount:DB.savings.balance-amount;
  DB.savings.history.push({id:genId(),type,amount,date,note});
  await setDoc(savRef(),DB.savings); closeModal(); render();
}

async function delSav(id){
  if(!confirm('Delete?')) return;
  const e=DB.savings.history.find(h=>h.id===id);
  if(e) DB.savings.balance+=e.type==='deposit'?-e.amount:e.amount;
  DB.savings.history=DB.savings.history.filter(h=>h.id!==id);
  if(DB.savings.balance<0) DB.savings.balance=0;
  await setDoc(savRef(),DB.savings); render();
}

let statsYear = new Date().getFullYear();
let statsMonth = new Date().getMonth();
const STAT_COLORS = ['#7c6ef7','#5ee6c0','#f7c76e','#f76e6e','#6eaff7','#f76eae','#ae6ef7','#5ec0e6','#94e65e'];
const MN = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function renderStats(){
  const notifGranted = Notification.permission === 'granted';
  const expenses = DB.transactions.filter(t=>{
    if(t.type!=='expense') return false;
    const d=new Date(t.date+'T00:00:00');
    return d.getFullYear()===statsYear && d.getMonth()===statsMonth;
  });
  const total = expenses.reduce((s,t)=>s+t.amount,0);

  // group by category
  const catMap = {};
  expenses.forEach(t=>{
    const k=t.category||'other';
    catMap[k]=(catMap[k]||0)+t.amount;
  });
  const segments = Object.entries(catMap)
    .sort((a,b)=>b[1]-a[1])
    .map(([id,val],i)=>({id,val,color:STAT_COLORS[i%STAT_COLORS.length],cat:cat(id)}));

  const legendRows = segments.map(s=>{
    const pct=total>0?(s.val/total*100).toFixed(1):0;
    return `<div onclick="W.openCatDetail('${s.id}')" style="cursor:pointer;padding:8px;border-radius:10px;transition:background 0.15s;" onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background='transparent'">
      <div class="legend-row">
        <div class="legend-dot" style="background:${s.color};box-shadow:0 0 6px ${s.color};"></div>
        <div class="legend-name">${s.cat.icon} ${s.cat.label||s.id}</div>
        <div class="legend-pct">${pct}%</div>
        <div class="legend-val">${fmtETB(s.val)}</div>
        <div style="color:var(--muted);font-size:14px;margin-left:4px;">›</div>
      </div>
      <div class="legend-bar-wrap" style="margin-left:20px;">
        <div class="legend-bar" style="width:${pct}%;background:${s.color};"></div>
      </div>
    </div>`;
  }).join('');

  const notifSection = `
  <div class="section-title">🔔 Notifications</div>
  <div style="padding:0 20px 20px;">
    ${notifGranted
      ? `<div class="card" style="display:flex;align-items:center;gap:12px;">
          <div style="font-size:24px;">✅</div>
          <div style="flex:1;"><div style="font-size:14px;font-weight:600;">Notifications enabled</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px;">You'll get a daily reminder to log expenses</div></div>
        </div>`
      : `<div class="notif-banner">
          <div style="font-size:24px;">🔔</div>
          <div class="notif-banner-text"><strong>Enable daily reminders</strong><br/>Get notified every evening to log your expenses.</div>
          <button class="btn btn-primary" style="padding:8px 14px;font-size:13px;" onclick="W.reqNotif()">Enable</button>
        </div>`
    }
  </div>`;

  return `
  <div class="page-header"><div class="page-title">Stats</div></div>
  <div class="month-nav">
    <button class="mnav-btn" onclick="W.statsMonth(-1)">‹</button>
    <div class="mnav-label">${MN[statsMonth]} ${statsYear}</div>
    <button class="mnav-btn" onclick="W.statsMonth(1)">›</button>
  </div>
  <div style="padding:0 20px 16px;">
    <div class="card" style="text-align:center;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">TOTAL EXPENSES</div>
      <div style="font-size:28px;font-weight:800;color:var(--red);">${fmtETB(total)}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;">${expenses.length} transactions</div>
    </div>
  </div>
  ${segments.length===0
    ? `<div class="empty"><div class="empty-icon">🍩</div>No expenses this month</div>`
    : `<div class="chart-wrap">
        <div class="donut-container">
          <canvas id="donut-canvas" width="220" height="220"></canvas>
          <div class="donut-center">
            <div class="donut-center-val">${segments.length}</div>
            <div class="donut-center-lbl">categories</div>
          </div>
        </div>
      </div>
      <div class="legend">${legendRows}</div>`
  }

  <div class="section-title">📅 Daily Spending</div>
  <div style="padding:0 20px 16px;">
    <div class="card" style="padding:16px 12px;">
      <canvas id="daily-canvas" height="120" style="width:100%;"></canvas>
    </div>
  </div>

  <div class="section-title">🧾 Daily Breakdown</div>
  <div style="background:var(--surface);margin:0 20px;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;">
    ${(()=>{
      // group expenses by day
      const dayMap={};
      expenses.forEach(t=>{
        const d=t.date||'';
        dayMap[d]=(dayMap[d]||0)+t.amount;
      });
      const days=Object.entries(dayMap).sort((a,b)=>b[0].localeCompare(a[0]));
      if(days.length===0) return '<div class="empty"><div class="empty-icon">📅</div>No daily data</div>';
      const maxDay=Math.max(...days.map(d=>d[1]));
      return days.map(([date,amt])=>{

function drawDailyChart(){
  const canvas = document.getElementById('daily-canvas');
  if(!canvas) return;
  canvas.width = canvas.offsetWidth || 300;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = 120;

  const expenses = DB.transactions.filter(t=>{
    if(t.type!=='expense') return false;
    const d=new Date(t.date+'T00:00:00');
    return d.getFullYear()===statsYear && d.getMonth()===statsMonth;
  });

  // build days in month
  const daysInMonth = new Date(statsYear, statsMonth+1, 0).getDate();
  const dayTotals = Array(daysInMonth).fill(0);
  expenses.forEach(t=>{
    const d=new Date(t.date+'T00:00:00');
    if(d.getMonth()===statsMonth) dayTotals[d.getDate()-1]+=t.amount;
  });

  const maxVal = Math.max(...dayTotals, 1);
  const barW = Math.max(2, (W - 20) / daysInMonth - 2);
  const today = new Date().getDate()-1;

  ctx.clearRect(0,0,W,H);

  dayTotals.forEach((val,i)=>{
    const x = 10 + i*((W-20)/daysInMonth);
    const barH = val>0 ? Math.max(4, (val/maxVal)*(H-24)) : 2;
    const y = H - 16 - barH;
    const isToday = i===today && statsMonth===new Date().getMonth() && statsYear===new Date().getFullYear();
    const isHigh = val/maxVal > 0.7;

    // glow for high spending days
    if(isHigh){
      ctx.shadowColor='#f76e6e';
      ctx.shadowBlur=8;
    }
    ctx.fillStyle = isToday ? '#7c6ef7' : isHigh ? '#f76e6e' : val>0 ? '#5ee6c0' : '#2e2e3e';
    ctx.beginPath();
    ctx.roundRect(x, y, barW, barH, 3);
    ctx.fill();
    ctx.shadowBlur=0;

    // day number every 5 days
    if((i+1)%5===0||i===0){
      ctx.fillStyle='#7a7a94';
      ctx.font='9px system-ui';
      ctx.textAlign='center';
      ctx.fillText(i+1, x+barW/2, H-2);
    }
  });
}

function drawDonut(){
  const canvas = document.getElementById('donut-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const expenses = DB.transactions.filter(t=>{
    if(t.type!=='expense') return false;
    const d=new Date(t.date+'T00:00:00');
    return d.getFullYear()===statsYear && d.getMonth()===statsMonth;
  });
  const catMap = {};
  expenses.forEach(t=>{ const k=t.category||'other'; catMap[k]=(catMap[k]||0)+t.amount; });
  const segments = Object.entries(catMap).sort((a,b)=>b[1]-a[1])
    .map(([id,val],i)=>({val,color:STAT_COLORS[i%STAT_COLORS.length]}));
  const total = segments.reduce((s,x)=>s+x.val,0);
  if(!total) return;

  const cx=110, cy=110, outerR=90, innerR=58;
  let angle = -Math.PI/2;
  ctx.clearRect(0,0,220,220);

  segments.forEach((seg,i)=>{
    const sweep = (seg.val/total)*2*Math.PI;
    ctx.beginPath();
    ctx.moveTo(cx+outerR*Math.cos(angle), cy+outerR*Math.sin(angle));
    ctx.arc(cx,cy,outerR,angle,angle+sweep);
    ctx.arc(cx,cy,innerR,angle+sweep,angle,true);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();
    // gap between segments
    angle += sweep + 0.02;
  });

  // inner circle background
  ctx.beginPath();
  ctx.arc(cx,cy,innerR-2,0,2*Math.PI);
  ctx.fillStyle='#1a1a22';
  ctx.fill();
}

function scheduleReminder(){
  if(Notification.permission!=='granted') return;
  const now=new Date();
  const target=new Date(now.getFullYear(),now.getMonth(),now.getDate(),20,0,0); // 8pm
  let ms=target-now;
  if(ms<0) ms+=86400000; // next day
  setTimeout(()=>{
    new Notification('Hisab 💰',{body:'Don\'t forget to log today\'s expenses!',icon:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/72x72/1f4b0.png'});
    scheduleReminder(); // reschedule for next day
  },ms);
}

// Auto-schedule if already granted

if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='hisab-v1';
    self.addEventListener('install',e=>{
      e.waitUntil(caches.open(CACHE).then(c=>c.addAll([self.location.href])));
      self.skipWaiting();
    });
    self.addEventListener('activate',e=>{
      e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch',e=>{
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
        if(e.request.method==='GET'&&res.ok){
          caches.open(CACHE).then(c=>c.put(e.request,res.clone()));
        }
        return res;
      }).catch(()=>caches.match(e.request))));
    });`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

function compressToBase64(file, maxSize){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      const canvas = document.createElement('canvas');
      const scale = Math.min(maxSize/img.width, maxSize/img.height, 1);
      canvas.width  = img.width  * scale;
      canvas.height = img.height * scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = reject;
    img.src = url;
  });
}

async function processScreenshots(){
  if(!GEMINI_KEY){ alert('Add your Gemini API key first.'); return; }
  const files = document.getElementById('import-screenshots')?.files;
  if(!files||files.length===0){ alert('Select at least one screenshot.'); return; }

  closeModal();
  document.getElementById('app').innerHTML=`<div class="loader">🤖 Reading ${files.length} screenshot${files.length>1?'s':''}...</div>`;

  try{
    document.getElementById('app').innerHTML=`<div class="loader">🤖 Analyzing ${files.length} screenshot${files.length>1?'s':''}...</div>`;
    const promises = Array.from(files).map(async f=>{
      const b64 = await fileToBase64(f);
      return geminiExtract(b64);
    });
    const all = await Promise.all(promises);
    const results = all.flat();

    if(results.length===0){
      buildApp(); render();
      alert('No transactions found. Try clearer screenshots.');
      return;
    }

    buildApp();
    showImportPreview(results);
  } catch(e){
    buildApp(); render();
    alert('Error: '+e.message);
  }

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e=>resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function geminiExtract(base64){
  const accountNames = DB.accounts.map(a=>a.name).join(', ');
  const prompt = `You are analyzing a bank statement or transaction screenshot from an Ethiopian bank.
Available bank accounts: ${accountNames}.

IMPORTANT RULES:
- Merge VAT, commission, service charge, and any fees INTO the main transaction they belong to (add them to the main amount, do not list separately)
- Each real transaction should appear as ONE entry with the total amount including all fees
- Detect which bank this screenshot is from
- Extract only real transactions (transfers, payments, purchases) — not balance lines or headers

Return a JSON array where each object has:
{"accountId":"cbe|awash|abys|orm|zemen|nib|telebirr","name":"short clear description","amount":number,"type":"income" or "expense","date":"YYYY-MM-DD","category":"food|rent|fuel|clothes|transport|utilities|business|health|other","note":"any extra info"}

accountId mapping: CBE→cbe, Awash→awash, Abyssinia→abys, Oromia→orm, Zemen→zemen, NIB→nib, Telebirr→telebirr
- If bank undetectable use "cbe"
- If date missing use ${new Date().toISOString().split('T')[0]}
- Amounts must be positive numbers
- Respond ONLY with the JSON array, no other text.`;

  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({contents:[{parts:[
      {text: prompt},
      {inline_data:{mime_type:'image/jpeg',data:base64}}
    ]}]})
  });

  if(!res.ok){ const e=await res.json(); throw new Error(e.error?.message||'Gemini API error'); }
  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text||'[]';
  const clean = text.replace(/```json\n?/g,'').replace(/```/g,'').trim();
  return JSON.parse(clean);
}
